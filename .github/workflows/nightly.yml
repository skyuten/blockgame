name: Nightly Release

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Windows64
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        lfs: true

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build Release
      run: MSBuild MinecraftConsoles.sln /t:Build /p:Configuration=Release /p:Platform=Windows64 /m

    - name: Inspect Release folder
      run: |
           Get-ChildItem -Path "x64/Release" -Recurse
           $size = (Get-ChildItem -Path "x64/Release" -Recurse | Measure-Object -Property Length -Sum).Sum
           Write-Output "Release folder size: $($size / 1MB) MB"
           
    - name: Zip build
      run: 7z a LCEWindows64.zip ./x64/Release/

    - name: Publish nightly
      uses: andelf/nightly-release@main
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: nightly
        name: Nightly Release
        files: |
           LCEWindows64.zip
           ./x64/Release/Minecraft.Client.exe
           ./x64/Release/Minecraft.Client.pdb
